build:
  gpu: true
  cuda: "12.1"
  python_version: "3.10"
  python_packages:
    - "torch>=2.0.1"
    - "torchvision>=0.15.2"
    - "diffusers>=0.25.0"
    - "transformers>=4.36.2"
    - "accelerate>=0.26.1"
    - "opencv-python-headless"
    - "safetensors"
    - "hf_transfer"
    - "huggingface_hub"
    - "peft"
    - "omegaconf"
  run:
    # Install dependencies required for OpenCV and model downloading
    - "apt-get update -y && apt-get install -y libgl1-mesa-glx libglib2.0-0 git wget"
    
    # Clone the official OmniTry repository into a safe directory
    - "git clone https://github.com/Kunbyte-AI/OmniTry.git /omnitry"
    
    # Download base model and LoRA weights from HuggingFace inline
    - "python -c \"import os; os.environ['HF_HUB_ENABLE_HF_TRANSFER']='1'; from huggingface_hub import snapshot_download; snapshot_download(repo_id='camenduru/FLUX.1-Fill-dev-ungated', local_dir='/omnitry/weights/flux')\""
    - "python -c \"import os; os.environ['HF_HUB_ENABLE_HF_TRANSFER']='1'; from huggingface_hub import snapshot_download; snapshot_download(repo_id='Kunbyte/OmniTry', local_dir='/omnitry/weights/checkpoints')\""

predict: "predict.py:Predictor"
